<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="bg-light min-vh-100 d-flex align-items-center">
    
    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-5">
                <div class="p-4 rounded-3 shadow-sm border bg-white">
                    
                    <h2 id="titulo" class="text-center mb-4 fw-bold">Login</h2>
            
            <form id="form-login">
                <div id="c-email" class="conjunto mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" placeholder="Digite seu email" required>
                </div>

                <div id="c-senha" class="conjunto mb-4">
                    <label for="senha" class="form-label">Senha</label>
                    <input type="password" class="form-control" id="senha" placeholder="Digite sua senha" required>
                </div>

                <button id="botao-envio" type="submit" class="btn btn-primary w-100 py-2">Entrar</button>
            </form>

            <div id="mensagem" class="text-center mt-3"></div>

            <div class="toggle" id="toggle">
                <p class="text-center mt-4">Não tem conta? Cadastre-se!</p>
            </div>
        </div>
    </main>

    <script src="script.js"></script>

</body>
</html>
